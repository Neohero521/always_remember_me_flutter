name: always_remember_me
description: 小说续写器 - 基于 Always_remember_me 扩展移植的 Flutter App
publish_to: 'none'
version: 5.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.4.0

  # Routing
  go_router: ^14.8.1

  # Database (keep Hive for Phase 1, Drift in Phase 2)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network
  dio: ^5.8.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # File picking
  file_picker: ^6.1.1

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  equatable: ^2.0.7

  # UI
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.4.0
  mockito: ^5.4.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
