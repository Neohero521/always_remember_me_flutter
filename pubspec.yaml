name: always_remember_me
description: 小说续写器 - AI 辅助写作 Flutter App (v5.0)
publish_to: 'none'
version: 5.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management - Riverpod
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.4.0

  # Routing
  go_router: ^14.8.1

  # Database - Drift (SQLite ORM)
  drift: 2.22.1
  drift_flutter: 0.2.4
  sqlite3_flutter_libs: 0.5.28

  # Network
  dio: ^5.8.0
  http: ^1.2.0
  shared_preferences: ^2.3.3

  # Storage
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.2

  # File picking
  file_picker: ^6.1.1

  # Serialization - Freezed
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Dependency Injection
  get_it: ^8.0.3

  # Functional Programming
  fpdart: ^1.1.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  equatable: ^2.0.7

  # UI
  cached_network_image: ^3.4.1
  graphview: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # Code Generation
  build_runner: ^2.4.0
  drift_dev: ^2.22.1
  freezed: ^2.5.7
  json_serializable: ^6.7.0
  riverpod_generator: ^2.4.0
  mockito: ^5.4.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
